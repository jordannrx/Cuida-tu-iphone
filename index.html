<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>JordannRX Oficial</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #050505, #202020);
    color: white;
    text-align: center;
}

.container {
    padding: 80px 20px;
}

.logo {
    font-size: 55px;
    font-weight: bold;
    animation: entrada 2s ease, brillo 3s infinite;
}

.descripcion {
    font-size: 20px;
    margin-top: 20px;
    opacity: 0;
    animation: aparecer 2s forwards;
    animation-delay: 1s;
}

.boton {
    display: inline-block;
    margin-top: 40px;
    padding: 15px 35px;
    background: white;
    color: black;
    border-radius: 30px;
    text-decoration: none;
    font-weight: bold;
    transition: 0.3s;
}

.boton:hover {
    transform: scale(1.1);
}

@keyframes entrada {
    from {
        transform: translateY(-50px);
        opacity: 0;
    }
    to {
        transform: translateY(0);
        opacity: 1;
    }
}

@keyframes aparecer {
    to {
        opacity: 1;
    }
}

@keyframes brillo {
    50% {
        text-shadow: 0 0 25px cyan;
    }
}

</style>

</head>

<body>

<div class="container">

<div class="logo">
JordannRX
</div>

<p class="descripcion">
Historias • Creaciones • Proyectos oficiales
</p>

<a class="boton" href="#">
Entrar
</a>
<section class="proyectos">

<h2>Mis Proyectos</h2>

<div class="tarjetas">

<div class="tarjeta">
<h3>Historias</h3>
<p>Series y relatos creados por JordannRX.</p>
</div>

<div class="tarjeta">
<h3>Creaciones</h3>
<p>Diseños, ideas y contenido original.</p>
</div>

<div class="tarjeta">
<h3>Próximamente</h3>
<p>Nuevos proyectos en desarrollo.</p>
</div>

</div>

</section>
</div>

</body>
</html>
